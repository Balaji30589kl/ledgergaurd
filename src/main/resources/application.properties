spring.application.name=ledgerguard-backend

# H2 file-based database for assignment-friendly persistence
spring.datasource.url=jdbc:h2:file:./data/ledgerguard-db;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 console (optional, for debugging)
spring.h2.console.enabled=true

# JPA/Hibernate configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Keep enabled for cleaner API error responses when validation/exception handling is added
server.error.include-message=always

